<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Business Card — Placeholder</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="avatar" aria-hidden="true">
        <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Avatar">
          <defs>
            <linearGradient id="g" x1="0" x2="1">
              <stop offset="0" stop-color="#6C63FF"/>
              <stop offset="1" stop-color="#00C2FF"/>
            </linearGradient>
          </defs>
          <rect width="120" height="120" rx="20" fill="url(#g)" />
          <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="46">IN</text>
        </svg>
      </div>
      <div class="info">
        <h1>Ivan Nebres</h1>
        <p class="role">Computer Science</p>
        <p class="company">CAPSU EDU.</p>
        <ul class="contact">
          <li>📞09307279578</li>
          <li>✉️ivannebres2@gmail.com</li>
          <li>🔗 <a href="https://github.com/ivannebres/business-card.git">Github.com</a></li>
          <li>📍 Capiz, Philippines</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
